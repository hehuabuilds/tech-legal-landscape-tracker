name: Scrape AI legal cases

# Runs twice a week (Mon & Thu, 06:00 UTC) plus on-demand. Scrapes public
# sources (CourtListener, FTC/SEC/DOJ/EU/CMA/CA-AG press releases, news RSS),
# uses Gemini to classify + structure the new items, and auto-commits any new
# records to main. Scraped rows land as confidence:low|medium / needs_review.
on:
  schedule:
    - cron: "0 6 * * 1,4" # Monday and Thursday at 06:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Needed so the job can push the updated cases.json back to the repo.
permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/scrape.ts

      - name: Commit new cases
        run: |
          if git diff --quiet -- src/data/cases.json; then
            echo "No changes to cases.json — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/cases.json
          count=$(git diff --cached --numstat -- src/data/cases.json | awk '{print $1}')
          git commit -m "chore(data): auto-scrape new AI legal cases ($(date -u +%Y-%m-%d))"
          git push
